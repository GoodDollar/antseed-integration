name = "gooddollar-antseed-integration"
main = "src/worker.ts"
compatibility_date = "2026-05-18"
compatibility_flags = ["nodejs_compat"]

# Production values should be set with wrangler secret for sensitive fields:
#   wrangler secret put RPC_URL
#   wrangler secret put VAULT_ADDRESS
#   wrangler secret put OPERATOR_PRIVATE_KEY
#   wrangler secret put ANTSEED_PIN_PEER
#   wrangler secret put ANTSEED_PIN_SERVICE
[vars]
ANTSEED_BASE_URL = "https://replace-with-public-antseed-buyer.example.com"
ANTSEED_MODEL = "qwen3-235b-instruct"
ANTSEED_TIMEOUT_MS = "120000"
PRICE_MICRO_USD_PER_1K_INPUT_TOKENS = "500"
PRICE_MICRO_USD_PER_1K_OUTPUT_TOKENS = "1500"
DEFAULT_MAX_OUTPUT_TOKENS = "1024"
MIN_RESERVE_MICRO_USD = "1000"
CREDIT_TOKEN_DECIMALS = "6"

[[kv_namespaces]]
binding = "ANTSEED_KV"
id = "00000000000000000000000000000000"
preview_id = "11111111111111111111111111111111"
