name = "gooddollar-antseed-integration"
main = "src/worker.ts"
compatibility_date = "2026-05-18"
compatibility_flags = ["nodejs_compat"]

# Production values should be set with wrangler secret for sensitive fields:
#   wrangler secret put ANTSEED_FUNDING_RPC_URL
#   wrangler secret put ANTSEED_FUNDING_VAULT_ADDRESS
#   wrangler secret put ANTSEED_FUNDING_OPERATOR_PRIVATE_KEY
[vars]
GD_MICRO_USD_PER_TOKEN = "1000000"
CELO_RPC_URL = "https://forno.celo.org"
CELO_VAULT_ADDRESS = "0x"
CELO_GOODID_ADDRESS = "0xC361A6E67822a0EDc17D899227dd9FC50BD62F42"
CELO_RESERVE_PRICE_ORACLE_ADDRESS = "0x2fFBB49055d487DdBBb0C052Cd7c2a02A7971e41"
CELO_RESERVE_EXCHANGE_ID = "0xba77f5c7bb3317643c6d81d1ef3f9913561741d92095f88efa402faf2cbe9124"

[[kv_namespaces]]
binding = "ANTSEED_KV"
id = "0831898ded5048049353498b8fc962f0"
preview_id = "11111111111111111111111111111111"

[triggers]
crons = ["0 0 * * *"]
