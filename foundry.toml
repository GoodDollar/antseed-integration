[profile.default]
src = "contracts/src"
test = "contracts/test"
script = "contracts/script"
out = "contracts/out"
cache_path = "contracts/cache"
libs = ["contracts/lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
fs_permissions = [
  { access = "read", path = "./" },
  { access = "read-write", path = "./deploy-celo-output.json" },
  { access = "read-write", path = "./deploy-base-output.json" },
]
remappings = [
  "forge-std/=contracts/lib/forge-std/src/",
  "@openzeppelin/contracts-upgradeable/=contracts/lib/openzeppelin-contracts-upgradeable/contracts/",
  "@openzeppelin/contracts/=contracts/lib/openzeppelin-contracts-upgradeable/lib/openzeppelin-contracts/contracts/",
]
